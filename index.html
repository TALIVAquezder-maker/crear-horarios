        }

        ::-webkit-scrollbar-thumb { background: #888; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }

        .dark ::-webkit-scrollbar-thumb { background: #4b5563; }
        .dark ::-webkit-scrollbar-thumb:hover { background: #6b7280; }

        // Funcionalidad de Modo Oscuro
        const themeToggleBtn = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');
        
        themeToggleBtn.addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
            if(document.documentElement.classList.contains('dark')) {
                themeIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path>';
            } else {
                themeIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>';
            }
        });

        // Sidebar Móvil
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebarOverlay');
        const mobileMenuBtn = document.getElementById('mobileMenuBtn');
        const closeSidebarBtn = document.getElementById('closeSidebarBtn');

        function toggleSidebar() {
            sidebar.classList.toggle('-translate-x-full');
            overlay.classList.toggle('hidden');
        }

        mobileMenuBtn.addEventListener('click', toggleSidebar);
        closeSidebarBtn.addEventListener('click', toggleSidebar);
        overlay.addEventListener('click', toggleSidebar);

        // Captura de Pantalla
        document.getElementById('downloadBtn').addEventListener('click', () => {
            const element = document.getElementById('captureArea');
            const btn = document.getElementById('downloadBtn');
            const originalText = btn.innerHTML;
            btn.innerHTML = 'Descargando...';
            btn.disabled = true;

            if (window.innerWidth < 768 && !sidebar.classList.contains('-translate-x-full')) {
                toggleSidebar();
            }

            html2canvas(element, {
                backgroundColor: '#ffffff',
                scale: 2
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'Horario_UAGRM.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
                
                btn.innerHTML = originalText;
                btn.disabled = false;
            }).catch(err => {
                console.error(err);
                alert('Error al descargar la imagen.');
                btn.innerHTML = originalText;
                btn.disabled = false;
            });
        });

        // Tonos chillones/vibrantes
        const vibrantColors = [
            '#c4f069', // Verde lima
            '#e89bf5', // Rosa chicle
            '#fced74', // Amarillo brillante
            '#fca35d', // Naranja brillante
            '#b0bdfa', // Azul lavanda
            '#8df0d6', // Turquesa
            '#ff9eaa', // Salmón claro
            '#75e6a4', // Verde menta
            '#e8b0ff', // Lila brillante
            '#ffdb58'  // Amarillo oro
        ];

        // Bloques de horario oficiales de la UAGRM (45 min)
        const masterPeriods = [
            { s: '07:00', e: '07:45' }, { s: '07:45', e: '08:30' },
            { s: '08:30', e: '09:15' }, { s: '09:15', e: '10:00' },
            { s: '10:00', e: '10:45' }, { s: '10:45', e: '11:30' },
            { s: '11:30', e: '12:15' }, { s: '12:15', e: '13:00' },
            { s: '13:00', e: '13:45' }, { s: '13:45', e: '14:30' },
            { s: '14:30', e: '15:15' }, { s: '15:15', e: '16:00' },
            { s: '16:00', e: '16:45' }, { s: '16:45', e: '17:30' },
            { s: '17:30', e: '18:15' }, { s: '18:15', e: '19:00' },
            { s: '19:00', e: '19:45' }, { s: '19:45', e: '20:30' },
            { s: '20:30', e: '21:15' }, { s: '21:15', e: '22:00' },
            { s: '22:00', e: '22:45' }
        ];
        
        let subjects = {};
        let mySchedule = [];

        function timeToMinutes(t) {
            let [h, m] = t.split(':').map(Number);
            return (h * 60) + m;
        }

        function parseData() {
            const lines = rawData.split('\n').map(l => l.trim()).filter(l => l);
            let currentSubj = null;

            lines.forEach(line => {
                let subjMatch = line.match(/^(DER\d{3})-(.*)/);
                if (subjMatch) {
                    currentSubj = subjMatch[1];
                    subjects[currentSubj] = { id: currentSubj, name: subjMatch[2], groups: {} };
                    return;
                }
                
                let groupMatch = line.match(/^([A-Z0-9]+)-(.*)/);
                if (groupMatch && !line.includes('|')) {
                    subjects[currentSubj].groups[groupMatch[1]] = {
                        id: groupMatch[1],
                        docente: groupMatch[2],
                        sessions: []
                    };
                    return;
                }

                if (line.includes('|') && currentSubj) {
                    const groupIds = Object.keys(subjects[currentSubj].groups);
                    const lastGroup = groupIds[groupIds.length - 1];
                    
                    line.split('|').forEach(session => {
                        let parts = session.trim().split(' ');
                        if (parts.length >= 2) {
                            subjects[currentSubj].groups[lastGroup].sessions.push({
                                dia: parts[0],
                                times: parts[1],
                                aula: parts.slice(2).join(' ') || 'Sin Aula'
                            });
                        }
                    });
                }
            });
        }

        function initSelects() {
            const subjSelect = document.getElementById('subjectSelect');
            Object.values(subjects).forEach(s => {
                let opt = document.createElement('option');
                opt.value = s.id;
                opt.text = s.id + ' - ' + s.name;
                subjSelect.appendChild(opt);
            });

            subjSelect.addEventListener('change', (e) => {
                const grpSelect = document.getElementById('groupSelect');
                grpSelect.innerHTML = '<option value="">Seleccione grupo...</option>';
                const addBtn = document.getElementById('addBtn');
                
                if(!e.target.value) {
                    grpSelect.disabled = true;
                    addBtn.disabled = true;
                    return;
                }
                
                grpSelect.disabled = false;
                const groups = subjects[e.target.value].groups;
                Object.values(groups).forEach(g => {
                    let opt = document.createElement('option');
                    opt.value = g.id;
                    opt.text = `Grupo ${g.id} - ${g.docente}`;
                    grpSelect.appendChild(opt);
                });
            });

            document.getElementById('groupSelect').addEventListener('change', (e) => {
                document.getElementById('addBtn').disabled = !e.target.value;
            });
        }

        function renderCalendar() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            
            if(mySchedule.length === 0) {
                document.getElementById('materiasFooter').innerText = 'MATERIAS 0 :';
                return; // No mostramos ninguna fila si no hay materias
            }

            masterPeriods.forEach(p => {
                const pStart = timeToMinutes(p.s);
                const pEnd = timeToMinutes(p.e);
                
                let hasClassInRow = false;
                const days = ['Lu', 'Ma', 'Mi', 'Ju', 'Vi', 'Sa'];
                let rowData = days.map(day => {
                    let cellData = null;
                    for(let i=0; i<mySchedule.length; i++) {
                        const item = mySchedule[i];
                        for(let session of item.group.sessions) {
                            if(session.dia === day) {
                                const [sStart, sEnd] = session.times.split('-');
                                const cStart = timeToMinutes(sStart);
                                const cEnd = timeToMinutes(sEnd);
                                
                                // Si el bloque está dentro del rango de la clase
                                if(pStart >= cStart && pEnd <= cEnd) {
                                    cellData = {
                                        bg: vibrantColors[i % vibrantColors.length],
                                        text: `${item.subject.id}<br>- ${item.group.id}`
                                    };
                                    hasClassInRow = true;
                                    break;
                                }
                            }
                        }
                        if(cellData) break;
                    }
                    return cellData;
                });

                // Solo agregamos la fila si al menos una materia cae en este horario
                if(!hasClassInRow) return;

                let rowHtml = `<tr>`;
                rowHtml += `<td class="text-[#555] align-middle w-28 py-4" style="font-size: 14px;">${p.s} -<br>${p.e}</td>`;
                
                rowData.forEach(cell => {
                    if(cell) {
                        rowHtml += `<td class="text-gray-800 align-middle px-2 py-4" style="background-color: ${cell.bg}; font-size: 14px;">
                            <div class="flex flex-col items-center justify-center font-normal leading-relaxed gap-1">
                                <span>${cell.text.split('<br>')[0]}</span>
                                <span>${cell.text.split('<br>')[1]}</span>
                            </div>
                        </td>`;
                    } else {
                        rowHtml += `<td></td>`;
                    }
                });
                
                rowHtml += `</tr>`;
                tbody.innerHTML += rowHtml;
            });

            // Actualizar pie de tabla
            const footer = document.getElementById('materiasFooter');
            const names = mySchedule.map(s => s.subject.id).join(', ');
            footer.innerText = `MATERIAS ${mySchedule.length} : ${names}`;
        }

        function renderList() {
            const list = document.getElementById('addedList');
            const counter = document.getElementById('materiasCounter');
            list.innerHTML = '';
            if (counter) counter.innerText = `(${mySchedule.length})`;
            
            mySchedule.forEach((item, index) => {
                const li = document.createElement('li');
                li.className = "bg-white dark:bg-gray-700 p-2 md:p-3 rounded shadow-sm border-l-4 text-xs md:text-sm flex justify-between items-center transition-colors duration-200";
                li.style.borderLeftColor = vibrantColors[index % vibrantColors.length];
                
                li.innerHTML = `
                    <div>
                        <p class="font-bold text-gray-800 dark:text-gray-100">${item.subject.id}</p>
                        <p class="text-[10px] md:text-xs text-gray-500 dark:text-gray-400">Grp: ${item.group.id} - ${item.group.docente}</p>
                    </div>
                    <button onclick="removeClass(${index})" class="text-red-500 hover:text-red-700 dark:text-red-400 p-1">
                        <svg class="w-4 h-4 md:w-5 md:h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                    </button>
                `;
                list.appendChild(li);
            });
        }

        window.removeClass = function(index) {
            mySchedule.splice(index, 1);
            renderCalendar();
            renderList();
        }

        document.getElementById('addBtn').addEventListener('click', () => {
            const subjId = document.getElementById('subjectSelect').value;
            const groupId = document.getElementById('groupSelect').value;
            
            if(mySchedule.find(s => s.subject.id === subjId)) {
                alert("Ya tienes agregada esta materia.");
                return;
            }

            const subject = subjects[subjId];
            const group = subject.groups[groupId];
            
            if(group.sessions.length === 0) {
                alert("Este grupo no tiene horarios definidos.");
                return;
            }

            for (let newSession of group.sessions) {
                let [newStartStr, newEndStr] = newSession.times.split('-');
                let newStart = timeToMinutes(newStartStr);
                let newEnd = timeToMinutes(newEndStr);

                for (let existingItem of mySchedule) {
                    for (let existingSession of existingItem.group.sessions) {
                        if (existingSession.dia === newSession.dia) {
                            let [exStartStr, exEndStr] = existingSession.times.split('-');
                            let exStart = timeToMinutes(exStartStr);
                            let exEnd = timeToMinutes(exEndStr);

                            if (newStart < exEnd && newEnd > exStart) {
                                alert(`¡Choque de horarios!\n\nLa materia "${subject.id} (${groupId})" choca con "${existingItem.subject.id} (${existingItem.group.id})" el día ${newSession.dia} en el horario de ${existingSession.times}.`);
                                return;
                            }
                        }
                    }
                }
            }

            mySchedule.push({ subject, group });
            
            document.getElementById('subjectSelect').value = '';
            document.getElementById('groupSelect').innerHTML = '<option value="">Seleccione grupo...</option>';
            document.getElementById('groupSelect').disabled = true;
            document.getElementById('addBtn').disabled = true;

            renderCalendar();
            renderList();

            if (window.innerWidth < 768 && !sidebar.classList.contains('-translate-x-full')) {
                toggleSidebar();
            }
        });

        // Inicialización
        parseData();
        initSelects();
        renderCalendar();
    </script>
